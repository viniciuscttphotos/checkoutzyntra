<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYNTRA | Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --navy: #001F3F; --gold: #D4AF37; --ice: #FBFBFE; }
        body { font-family: 'Inter', sans-serif; background-color: var(--ice); color: #1D1D1F; }
        
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        
        .product-card {
            background: white;
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0,0,0,0.03);
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border-color: var(--gold);
        }

        #cart-drawer {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .drawer-open { transform: translateX(0) !important; }

        /* Scrollbar customisada */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .active-filter {
            background-color: var(--navy) !important;
            color: white !important;
        }
    </style>
</head>
<body class="antialiased overflow-x-hidden">

    <!-- ANNOUNCEMENT BAR -->
    <div class="bg-[#001F3F] text-white text-[10px] py-2 text-center font-bold tracking-[0.2em] uppercase">
        Logística Privada • Envio em Embalagem Neutra • Suporte VIP
    </div>

    <!-- STICKY HEADER -->
    <nav class="glass sticky top-0 w-full z-50 border-b border-gray-100 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
                <div class="w-8 h-8 bg-[#001F3F] rounded-lg flex items-center justify-center">
                    <i data-lucide="component" class="w-5 h-5 text-[#D4AF37]"></i>
                </div>
                <span class="font-bold tracking-tighter text-2xl text-[#001F3F]">ZYNTRA</span>
            </div>

            <div class="hidden md:flex gap-8 text-[11px] font-bold uppercase tracking-widest text-gray-400">
                <button onclick="scrollToShop()" class="hover:text-[#D4AF37] transition">Compostos</button>
                <button class="hover:text-[#D4AF37] transition">Protocolos</button>
                <button class="hover:text-[#D4AF37] transition">Segurança</button>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="toggleCart()" class="relative flex items-center gap-2 bg-[#001F3F] text-white px-5 py-2.5 rounded-full hover:bg-black transition-all shadow-lg active:scale-95">
                    <i data-lucide="shopping-cart" class="w-4 h-4"></i>
                    <span id="cart-count" class="text-xs font-bold bg-[#D4AF37] text-[#001F3F] min-w-[1.25rem] h-5 px-1 rounded-full flex items-center justify-center ml-1">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="bg-white pt-20 pb-24 px-6">
        <div class="max-w-7xl mx-auto text-center">
            <h1 class="text-6xl md:text-8xl font-bold text-[#001F3F] tracking-tighter leading-none mb-8">
                Bio-Performance <br> <span class="italic font-serif text-[#D4AF37]">Premium.</span>
            </h1>
            <p class="text-gray-400 text-lg max-w-2xl mx-auto mb-10 leading-relaxed">
                Acesse a vanguarda da performance humana. Compostos de pureza farmacêutica com logística privada e discreta.
            </p>
            
            <!-- SEARCH BAR -->
            <div class="relative max-w-xl mx-auto">
                <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-300 w-5 h-5"></i>
                <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder="Buscar composto ou objetivo..." 
                class="w-full bg-gray-50 border border-gray-100 py-5 pl-14 pr-6 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#D4AF37]/20 transition-all shadow-sm">
            </div>
        </div>
    </section>

    <!-- SHOPPING AREA -->
    <main id="shop" class="max-w-7xl mx-auto px-6 py-20">
        <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <div class="flex gap-2 overflow-x-auto no-scrollbar w-full md:w-auto">
                <button onclick="filterBy('all')" id="filter-all" class="filter-btn active-filter px-6 py-2.5 rounded-xl border border-gray-100 text-[10px] font-bold uppercase tracking-widest transition-all">Todos</button>
                <button onclick="filterBy('performance')" id="filter-performance" class="filter-btn bg-white px-6 py-2.5 rounded-xl border border-gray-100 text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:border-[#D4AF37] transition-all">Performance</button>
                <button onclick="filterBy('recovery')" id="filter-recovery" class="filter-btn bg-white px-6 py-2.5 rounded-xl border border-gray-100 text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:border-[#D4AF37] transition-all">Recuperação</button>
            </div>
            <p class="text-[10px] font-bold text-gray-300 uppercase tracking-widest" id="product-results-count">Exibindo todos os compostos</p>
        </div>

        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <!-- Renderizado via Javascript -->
        </div>
    </main>

    <!-- CART DRAWER -->
    <div id="cart-overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[60] hidden opacity-0 transition-opacity duration-300"></div>
    
    <div id="cart-drawer" class="fixed top-0 right-0 h-full w-full max-w-md bg-white z-[70] shadow-2xl translate-x-full flex flex-col">
        <div class="p-6 border-b border-gray-50 flex justify-between items-center bg-white sticky top-0">
            <h3 class="font-bold text-[#001F3F] uppercase tracking-widest text-sm flex items-center gap-2">
                <i data-lucide="shopping-bag" class="w-4 h-4 text-[#D4AF37]"></i> Meu Carrinho
            </h3>
            <button onclick="toggleCart()" class="p-2 hover:bg-gray-50 rounded-full transition"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>

        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar">
            <!-- Itens do carrinho -->
        </div>

        <div class="p-8 bg-gray-50 border-t border-gray-100">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Total Estimado</p>
                    <p id="cart-total" class="text-3xl font-bold text-[#001F3F]">R$ 0,00</p>
                </div>
                <i data-lucide="shield-check" class="text-[#D4AF37] w-6 h-6 mb-1"></i>
            </div>
            <button onclick="sendOrder()" class="w-full bg-[#001F3F] text-white py-5 rounded-2xl font-bold uppercase tracking-[0.2em] text-[10px] hover:bg-black transition-all shadow-xl active:scale-95">
                Finalizar via WhatsApp Prioritário
            </button>
        </div>
    </div>

    <script>
        // ESTADO GLOBAL DO APP
        const State = {
            products: [
                { id: 1, name: 'CJC-1295 + Ipamorelin', dose: 'Protocolo 10mg', price: 520, cat: 'performance', icon: 'zap' },
                { id: 2, name: 'BPC-157 Elite', dose: 'Vial 5mg', price: 390, cat: 'recovery', icon: 'shield-plus' },
                { id: 3, name: 'Cardarine GW-501516', dose: '60 caps / 20mg', price: 380, cat: 'performance', icon: 'activity' },
                { id: 4, name: 'Epithalon', dose: 'Vial 10mg', price: 560, cat: 'recovery', icon: 'hourglass' },
                { id: 5, name: 'TB-500 Pro', dose: 'Vial 5mg', price: 450, cat: 'recovery', icon: 'replicate' },
                { id: 6, name: 'MK-677 Ibutamoren', dose: '30 caps / 25mg', price: 410, cat: 'performance', icon: 'target' },
                { id: 7, name: 'Tesamorelin', dose: 'Vial 10mg', price: 680, cat: 'performance', icon: 'flame' },
                { id: 8, name: 'Melanotan II', dose: 'Vial 10mg', price: 320, cat: 'performance', icon: 'sun' }
            ],
            cart: [],
            currentFilter: 'all',
            searchQuery: ''
        };

        // RENDERIZAÇÃO DA GRADE DE PRODUTOS
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            const filtered = State.products.filter(p => {
                const matchesFilter = State.currentFilter === 'all' || p.cat === State.currentFilter;
                const matchesSearch = p.name.toLowerCase().includes(State.searchQuery.toLowerCase());
                return matchesFilter && matchesSearch;
            });

            grid.innerHTML = filtered.map(p => `
                <div class="product-card p-6 flex flex-col justify-between min-h-[360px]">
                    <div>
                        <div class="flex justify-between items-start mb-6">
                            <span class="text-[9px] font-bold uppercase tracking-widest text-[#D4AF37] bg-[#D4AF37]/5 px-3 py-1 rounded-full">${p.cat}</span>
                            <div class="w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center text-[#001F3F]/20">
                                <i data-lucide="${p.icon}"></i>
                            </div>
                        </div>
                        <h3 class="font-bold text-[#001F3F] text-lg leading-tight mb-2">${p.name}</h3>
                        <p class="text-xs text-gray-400 font-medium mb-4">${p.dose}</p>
                    </div>
                    <div class="pt-6 border-t border-gray-50 flex justify-between items-center">
                        <div>
                            <p class="text-[10px] text-gray-300 font-bold uppercase">Investimento</p>
                            <p class="text-lg font-bold text-[#001F3F]">R$ ${p.price},00</p>
                        </div>
                        <button onclick="addToCart(${p.id})" class="bg-[#001F3F] text-white p-3.5 rounded-2xl hover:scale-110 active:scale-95 transition-all shadow-md shadow-navy/10">
                            <i data-lucide="plus" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            `).join('');

            document.getElementById('product-results-count').innerText = `Encontrados: ${filtered.length} compostos`;
            lucide.createIcons(); // Vital para os ícones aparecerem após re-renderizar
        }

        // LÓGICA DO CARRINHO
        function addToCart(id) {
            const product = State.products.find(p => p.id === id);
            const existing = State.cart.find(item => item.id === id);

            if (existing) {
                existing.qty += 1;
            } else {
                State.cart.push({ ...product, qty: 1 });
            }
            
            updateCartUI();
            openCart();
        }

        function changeQty(id, delta) {
            const item = State.cart.find(i => i.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) {
                    State.cart = State.cart.filter(i => i.id !== id);
                }
                updateCartUI();
            }
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const countEl = document.getElementById('cart-count');

            if (State.cart.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-gray-300">
                        <i data-lucide="package-open" class="w-12 h-12 mb-4 opacity-20"></i>
                        <p class="text-xs font-bold uppercase tracking-widest">Protocolo Vazio</p>
                    </div>
                `;
            } else {
                container.innerHTML = State.cart.map(item => `
                    <div class="flex items-center gap-4 bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                        <div class="w-12 h-12 bg-gray-50 rounded-xl flex items-center justify-center text-[#D4AF37]">
                            <i data-lucide="${item.icon}" class="w-5 h-5"></i>
                        </div>
                        <div class="flex-1">
                            <h4 class="text-xs font-bold text-[#001F3F] leading-tight">${item.name}</h4>
                            <p class="text-[10px] text-[#D4AF37] font-bold mt-1">R$ ${item.price},00</p>
                        </div>
                        <div class="flex items-center gap-3 bg-gray-50 px-3 py-1.5 rounded-xl">
                            <button onclick="changeQty(${item.id}, -1)" class="text-gray-400 hover:text-red-500 transition"><i data-lucide="minus" class="w-3 h-3"></i></button>
                            <span class="text-xs font-bold text-[#001F3F] min-w-[12px] text-center">${item.qty}</span>
                            <button onclick="changeQty(${item.id}, 1)" class="text-gray-400 hover:text-navy transition"><i data-lucide="plus" class="w-3 h-3"></i></button>
                        </div>
                    </div>
                `).join('');
            }

            const total = State.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            totalEl.innerText = `R$ ${total.toLocaleString()},00`;
            countEl.innerText = State.cart.reduce((sum, item) => sum + item.qty, 0);
            
            lucide.createIcons();
        }

        // CONTROLES DE UI
        function toggleCart() {
            const drawer = document.getElementById('cart-drawer');
            const overlay = document.getElementById('cart-overlay');
            const isOpen = drawer.classList.contains('drawer-open');

            if (isOpen) {
                drawer.classList.remove('drawer-open');
                overlay.classList.add('hidden');
                overlay.style.opacity = "0";
            } else {
                drawer.classList.add('drawer-open');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.style.opacity = "1", 10);
            }
        }

        function openCart() {
            const drawer = document.getElementById('cart-drawer');
            const overlay = document.getElementById('cart-overlay');
            drawer.classList.add('drawer-open');
            overlay.classList.remove('hidden');
            overlay.style.opacity = "1";
        }

        function filterBy(cat) {
            State.currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active-filter', 'bg-[#001F3F]', 'text-white'));
            document.getElementById(`filter-${cat}`).classList.add('active-filter');
            renderProducts();
        }

        function handleSearch(val) {
            State.searchQuery = val;
            renderProducts();
        }

        function scrollToShop() {
            document.getElementById('shop').scrollIntoView({ behavior: 'smooth' });
        }

        function sendOrder() {
            if (State.cart.length === 0) return alert("Seu protocolo está vazio.");
            
            const total = State.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const itemsList = State.cart.map(i => `• ${i.name} (x${i.qty})`).join('%0A');
            const message = `Olá, gostaria de solicitar meu protocolo Zyntra:%0A%0A${itemsList}%0A%0ATotal: R$ ${total.toLocaleString()},00%0A%0A*Solicito atendimento para envio prioritário.*`;
            
            window.open(`https://wa.me/5511999999999?text=${message}`, '_blank');
        }

        // INICIALIZAÇÃO
        window.onload = () => {
            renderProducts();
            updateCartUI();
        };
    </script>
</body>
</html>
